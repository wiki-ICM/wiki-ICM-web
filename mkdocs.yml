site_name: wiki-ICM
site_url: https://github.com/wiki-ICM/wiki-ICM-web.git


nav:
  - Home: index.md
  - Primer Año :
      - Malla 2021: a121.md
      - Malla 2025: a125.md
  - Segundo Año : a2.md
  - Tercer Año : a3.md
  - Cuarto Año : a4.md
  - Quinto Año : a5.md
  - Sexto Año : a6.md
  - Electivos: elec.md
  - Otros: ot.md
  





theme: 
  name: material
  logo: assets/logof.png
  features:
    - navigation.instant.preview
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tracking
    - toc.integrate
    - navigation.expand


markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:      
        emoji_index: !!python/name:material.extensions.emoji.twemoji
        emoji_generator: !!python/name:material.extensions.emoji.to_svg
